<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AASO Dashboard{% block title %}{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; min-height: 100vh; }
        nav { width: 240px; background: #1e293b; padding: 1.5rem; border-right: 1px solid #334155; }
        nav h1 { font-size: 1.25rem; font-weight: 700; color: #38bdf8; margin-bottom: 2rem; }
        nav a { display: block; padding: 0.5rem 1rem; color: #94a3b8; text-decoration: none; border-radius: 6px; margin-bottom: 0.25rem; font-size: 0.9rem; transition: all 0.15s; }
        nav a:hover, nav a.active { background: #334155; color: #e2e8f0; }
        main { flex: 1; padding: 2rem; overflow-y: auto; }
        h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; color: #f1f5f9; }
        .card { background: #1e293b; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; border: 1px solid #334155; }
        .card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat { background: #1e293b; border-radius: 8px; padding: 1.25rem; border: 1px solid #334155; }
        .stat .label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        .stat .value { font-size: 1.75rem; font-weight: 700; color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem 0.5rem; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        th { color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }
        td { color: #e2e8f0; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-active { background: #065f46; color: #6ee7b7; }
        .badge-idle { background: #1e3a5f; color: #93c5fd; }
        .badge-completed { background: #065f46; color: #6ee7b7; }
        .badge-failed { background: #7f1d1d; color: #fca5a5; }
        .badge-pending { background: #713f12; color: #fcd34d; }
        .badge-busy { background: #713f12; color: #fcd34d; }
        .error { color: #fca5a5; }
        .link { color: #38bdf8; text-decoration: none; }
        .link:hover { text-decoration: underline; }
        .mt-4 { margin-top: 1rem; }
        pre { background: #0f172a; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; color: #e2e8f0; }
    </style>
</head>
<body>
    <nav>
        <h1>AASO</h1>
        <a href="/dashboard" class="{% if active == 'overview' %}active{% endif %}">Overview</a>
        <a href="/dashboard/executive" class="{% if active == 'executive' %}active{% endif %}">Executive</a>
        <a href="/dashboard/projects" class="{% if active == 'projects' %}active{% endif %}">Projects</a>
        <a href="/dashboard/workforce" class="{% if active == 'workforce' %}active{% endif %}">Workforce</a>
        <a href="/dashboard/costs" class="{% if active == 'costs' %}active{% endif %}">Costs</a>
        <a href="/dashboard/events" class="{% if active == 'events' %}active{% endif %}">Events</a>
        <a href="/docs" style="margin-top:2rem;color:#64748b;font-size:0.8rem;">API Docs</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
